<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ec-site</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <div class="card" :class="{ soldout: stock === 0 }">
            <img :src="image" :alt="name">

            <h2>{{ name }}</h2>

            <p class="price" :style="{ color: priceColor}"> ¥{{ price }}</p>

            <p>{{ description }}</p>

            <a :href="url" target="_blank">商品ページを見る</a>

            <button :disabled="stock === 0">カートに入れる</button>
            
        </div>
    </div>

    <!-- Vue.js本体（CDN） -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- 自作のJavaScript -->
    <script src="script.js"></script>

</body>

</html>
